<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>IDRW Game Prototype</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #0b1020;
      color: white;
      padding: 20px;
    }

    input, button {
      padding: 6px;
      margin: 4px;
    }

    .box {
      border: 1px solid #333;
      padding: 10px;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<h2>IDRW Roll & Write Prototype</h2>

<div class="box">
  <h3>Create Game</h3>
  <input id="createCode" placeholder="Game Code (e.g. ABCD)" />
  <input id="createName" placeholder="Your Name" />
  <button onclick="createGame()">Create</button>
</div>

<div class="box">
  <h3>Join Game</h3>
  <input id="joinCode" placeholder="Game Code" />
  <input id="joinName" placeholder="Your Name" />
  <button onclick="joinGame()">Join</button>
</div>

<div class="box">
  <h3>Game Info</h3>
  <div>Game ID: <span id="gameId">-</span></div>
  <div>Status: <span id="gameStatus">-</span></div>
  <div>Turn: <span id="gameTurn">-</span></div>
</div>

<div class="box">
  <h3>Players</h3>
  <div id="players"></div>
</div>

<script>
/* =========================
   SUPABASE CLIENT
========================= */

const supabaseClient = supabase.createClient(
  "YOUR_SUPABASE_URL",
  "YOUR_SUPABASE_ANON_KEY"
)

/* =========================
   TOKEN (anonymous identity)
========================= */

function getToken() {
  let token = localStorage.getItem("player_token")

  if (!token) {
    token = crypto.randomUUID() + crypto.randomUUID()
    localStorage.setItem("player_token", token)
  }

  return token
}

/* =========================
   STATE
========================= */

let currentGameId = null
let channel = null

/* =========================
   CREATE GAME
========================= */

async function createGame() {
  console.log("createGame clicked")

  const code = document.getElementById("createCode").value
  const name = document.getElementById("createName").value

  const { data, error } = await supabaseClient.rpc("create_game", {
    p_game_code: code,
    p_display_name: name,
    p_token: getToken()
  })

  console.log("create_game result:", { data, error })

  if (error) {
    alert(error.message)
    return
  }

  currentGameId = data
  document.getElementById("gameId").innerText = data

  await loadPlayers(data)     // initial load
  subscribeToGame(data)       // realtime
}

/* =========================
   JOIN GAME
========================= */

async function joinGame() {
  console.log("joinGame clicked")

  const code = document.getElementById("joinCode").value
  const name = document.getElementById("joinName").value

  const { data, error } = await supabaseClient.rpc("join_game", {
    p_game_code: code,
    p_display_name: name,
    p_token: getToken()
  })

  console.log("join_game result:", { data, error })

  if (error) {
    alert(error.message)
    return
  }

  currentGameId = data
  document.getElementById("gameId").innerText = data

  await loadPlayers(data)
  subscribeToGame(data)
}

/* =========================
   LOAD PLAYERS
========================= */

async function loadPlayers(gameId) {
  console.log("loading players for", gameId)

  const { data, error } = await supabaseClient
    .from("IDRWplayers")
    .select("*")
    .eq("game_id", gameId)

  console.log("players response:", { data, error })

  if (error) {
    console.error("Supabase error:", error)
    return
  }

  if (!data) return

  const container = document.getElementById("players")
  container.innerHTML = ""

  data.forEach(p => {
    const div = document.createElement("div")
    div.innerText = `Seat ${p.seat_number}: ${p.display_name}`
    container.appendChild(div)
  })
}

/* =========================
   REALTIME SUBSCRIPTION
========================= */

function subscribeToGame(gameId) {

  if (channel) {
    channel.unsubscribe()
  }

  channel = supabaseClient.channel(`game-${gameId}`)

  // 🔥 LOBBY SYNC (players)
  channel.on(
    "postgres_changes",
    {
      event: "*",
      schema: "public",
      table: "IDRWplayers"
    },
    async (payload) => {
      console.log("🔥 PLAYER EVENT:", payload)
      await loadPlayers(currentGameId)
    }
  )

  // 🔥 GAME STATE SYNC
  channel.on(
    "postgres_changes",
    {
      event: "*",
      schema: "public",
      table: "IDRWgames",
      filter: `id=eq.${gameId}`
    },
    (payload) => {
      console.log("🎮 GAME EVENT:", payload)

      const game = payload.new
      document.getElementById("gameStatus").innerText = game.status
      document.getElementById("gameTurn").innerText = game.current_turn
    }
  )

  channel.subscribe((status) => {
    console.log("Realtime status:", status)
  })
}

</script>

</body>
</html>
